html{height:100%;}
body{

  font-family:-apple-system,ui-monospace,'Courier New',monospace;
  font-size:16px;
  height:100dvh;
  display:flex;flex-direction:column;

  padding-bottom:env(safe-area-inset-bottom);
}
.header{
  flex-shrink:0;display:flex;align-items:center;gap:12px;
  padding:10px 16px 8px;border-bottom:1px solid rgba(0,229,255,.2);
  background:rgba(0,4,10,.9);
}
.holo-mini{position:relative;width:44px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.holo-mini .core{width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle,var(--core,#00e5ff) 0%,rgba(0,229,255,.2) 70%,transparent 100%);
  box-shadow:0 0 16px var(--core,#00e5ff);animation:breathe 4s ease-in-out infinite;}
.holo-mini .ring{position:absolute;border-radius:50%;border:1px solid rgba(0,229,255,.4);animation:spin linear infinite;}
.holo-mini .r1{width:26px;height:26px;animation-duration:8s;}
.holo-mini .r2{width:36px;height:36px;border-style:dashed;animation-duration:12s;animation-direction:reverse;}
.holo-mini .r3{width:44px;height:44px;border-color:rgba(0,229,255,.15);animation-duration:20s;}
.thinking .core{box-shadow:0 0 28px var(--core,#00e5ff);animation-duration:1s;}
.thinking .ring{animation-duration:2s!important;}
.listening .core{box-shadow:0 0 36px #ff5252,inset 0 0 18px rgba(255,82,82,.5);background:radial-gradient(circle,#ff5252 0%,rgba(255,82,82,.2) 70%,transparent 100%);animation-duration:0.6s;}
.listening .ring{border-color:rgba(255,82,82,.5)!important;animation-duration:1.5s!important;}
#holo{-webkit-user-select:none;user-select:none;cursor:pointer;}
#listenHint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,82,82,.18);border:1px solid rgba(255,82,82,.5);color:#ffb3b3;padding:8px 18px;border-radius:999px;font-size:12px;letter-spacing:2px;z-index:50;display:none;backdrop-filter:blur(6px);}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
.title-block{flex:1;min-width:0;}
.title{font-family:'Cinzel',ui-monospace,monospace;font-size:15px;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 12px rgba(0,229,255,.5);}
.subtitle{font-size:10px;color:rgba(0,229,255,.4);letter-spacing:1px;margin-top:2px;}
.badge{font-size:10px;letter-spacing:1.5px;padding:4px 10px;border-radius:999px;border:1px solid var(--vc,#00e5ff);color:var(--vc,#00e5ff);text-shadow:0 0 8px var(--vc,#00e5ff);flex-shrink:0;}
#chat{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px;}
#chat::-webkit-scrollbar{width:0;}
.msg{padding:12px 14px;border-radius:14px;font-size:15px;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-width:88%;}
.msg.user{background:rgba(0,150,200,.16);border:1px solid rgba(100,180,220,.25);align-self:flex-end;border-bottom-right-radius:4px;}
.msg.tru{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);align-self:flex-start;border-bottom-left-radius:4px;}
.msg .vd{font-size:9px;letter-spacing:1.5px;margin-bottom:5px;color:var(--mc,#00e5ff);opacity:.7;}
.ready{color:#88aabb;font-size:14px;line-height:1.7;padding:8px 4px;}
.ready .h{color:var(--cyan);letter-spacing:2px;margin-bottom:10px;font-size:15px;}
.sugg{display:flex;flex-direction:column;gap:7px;margin-top:12px;}
.sugg button{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.25);color:#cfeeff;text-align:left;padding:11px 14px;border-radius:10px;font-family:inherit;font-size:14px;cursor:pointer;min-height:44px;}
.sugg button:active{background:rgba(0,229,255,.2);}
.thinking-dots{color:var(--cyan);font-size:13px;letter-spacing:2px;padding:10px 4px;}
.inputbar{flex-shrink:0;display:flex;gap:10px;align-items:center;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(0,4,10,.95);border-top:1px solid rgba(0,229,255,.25);}
#input{flex:1;padding:14px 18px;background:rgba(0,20,30,.8);border:1px solid rgba(0,229,255,.4);color:#fff;border-radius:24px;font-size:16px;font-family:inherit;outline:none;min-height:48px;-webkit-appearance:none;}
#input:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,.3);}
#send{width:48px;height:48px;flex-shrink:0;background:var(--cyan);color:#001018;border:none;border-radius:50%;font-size:18px;font-weight:bold;cursor:pointer;box-shadow:0 0 16px rgba(0,229,255,.5);display:flex;align-items:center;justify-content:center;-webkit-appearance:none;}
#send:disabled{background:#002a36;color:#446;box-shadow:none;}
#send:active:not(:disabled){transform:scale(.92);}
#status{font-size:9px;color:rgba(0,229,255,.5);letter-spacing:1px;text-align:center;padding:2px 0 0;flex-shrink:0;}

.enc-result{padding:4px 0;}
.enc-title{font-size:1.3em;font-weight:bold;color:var(--accent,#5eead4);margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:6px;}
.enc-para{margin:8px 0;line-height:1.6;color:rgba(255,255,255,0.85);}
.enc-disambig{margin:8px 0;}
.enc-ditem{padding:4px 8px;color:var(--accent,#5eead4);cursor:default;}
.enc-hint{margin-top:8px;font-size:0.85em;opacity:0.6;}
.dict-result{padding:4px 0;}
.dict-word{font-size:1.3em;font-weight:bold;color:var(--accent,#5eead4);margin-bottom:8px;}
.dict-sense{margin:6px 0;line-height:1.5;}
.dict-pos{display:inline-block;background:rgba(94,234,212,0.15);color:var(--accent,#5eead4);font-size:0.75em;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:0.5px;}
.dict-num{opacity:0.6;font-size:0.9em;}
.dict-def{color:rgba(255,255,255,0.9);}
.dict-ex{color:rgba(255,255,255,0.55);font-style:italic;font-size:0.9em;}

function wordsToExpr(s){
  const toks=s.replace(/,/g," ").split(/\s+/).filter(Boolean);
  let out="",cur=0,have=false;
  const flush=()=>{ if(have){out+=cur;cur=0;have=false;} };
  for(const t of toks){
    if(/^[-+*/().]+$/.test(t)){ flush(); out+=t; continue; }
    if(/^\d+(\.\d+)?$/.test(t)){ flush(); out+=t; continue; }
    if(t in NUMWORDS){ cur+=NUMWORDS[t]; have=true; continue; }
    if(t in SCALEWORDS){ cur=(cur||1)*SCALEWORDS[t]; have=true; continue; }
    if(t==="and") continue;
    if(t==="plus"||t==="add"||t==="added"){ flush(); out+="+"; continue; }
    if(t==="minus"||t==="subtract"||t==="less"){ flush(); out+="-"; continue; }
    if(t==="times"||t==="multiply"||t==="multiplied"){ flush(); out+="*"; continue; }
    if(t==="divided"||t==="divide"){ flush(); out+="/"; continue; }
    if(t==="over"){ flush(); out+="/"; continue; }
    if(t==="x"){ flush(); out+="*"; continue; }
    if(t==="by") continue;
    return null;
  }
  flush();

function command(q){
  const raw=q.trim();

  m=raw.match(/^forget\s*:\s*(.+)$/i); if(m) return cmdForget(m[1]);
  m=raw.match(/^(?:correct|fix)\s*:\s*(.+)$/i); if(m) return cmdCorrect(m[1]);
  const low=raw.toLowerCase().replace(/[!.?]+$/,"").trim();
  if(low==="heal"||low==="self heal"||low==="self-heal"||low==="fix"||low==="diagnose"||low==="self diagnose"||low==="diagnosis"||low==="audit"||low==="doctor") return cmdHeal();

  if(low==="reset"||low==="wipe") return cmdReset();
  if(low==="brain"||low==="stats"||low==="status") return cmdStats();
  if(low==="prune"||low==="clean") return cmdPrune();
  if(low==="list"||low==="overlay") return cmdList();
  const rc=q.match(/^recall\s*:\s*(.*)$/i); if(rc) return cmdRecall(rc[1]);
  
  return null;
}

function doctrineLookup(q){
  const m=q.match(/^(?:what(?:'s|\s+is|\s+are)\s+|who\s+is\s+|define\s+|explain\s+)(.+?)[?\s]*$/i);

}

function isMetaJunk(node){

  if(k.match(/^tru_(html|json|js|css|idx|bm|script|node|data|overlay|const|core|engine|boot|send|route|answer|decide|verse|parse|small|talk|doc|memory|index|brain)_/)) return true;
  if(k.indexOf("_html_")>=0||k.indexOf("_json_")>=0||k.indexOf("_js_")>=0) return true;
  if(k.match(/^(gen|anchor|merge|ingest|prompt|skill|agent)_/)) return true;
  if(v.indexOf("function ")>=0&&v.indexOf("{")>=0&&v.indexOf("}")>=0) return true;
  if(v.match(/\b(const|let|var|return|=>|function)\b.*[\{;]/) && v.length>80) return true;
  if(v.indexOf("localStorage")>=0||v.indexOf("document.getElementById")>=0||v.indexOf("JSON.parse")>=0) return true;
  if(v.match(/^(Project|v0\.|Phase|TODO|FIXME|BUILD|PATCH|INGEST)/i) && v.length<200) return true;
  if(k==="logos"&&v.toLowerCase().indexOf("coherence")>=0) return true;
  if(k==="logos"&&v.toLowerCase().indexOf("recursive")>=0) return true;
  if(k==="calculate"&&v.toLowerCase().indexOf("prefix")>=0) return true;
  if(k==="calculate"&&v.toLowerCase().indexOf("regex")>=0) return true;
  if(k==="2_plus_2"&&v.toLowerCase().indexOf("guard")>=0) return true;
  if(k==="2_plus_2"&&v.toLowerCase().indexOf("eval")>=0) return true;
  if(k==="evolution"&&v.toLowerCase().indexOf("recursive")>=0) return true;
  if(k==="dry_truth"&&v.toLowerCase().indexOf("nudge")>=0) return true;
  if(k==="tru"&&v.toLowerCase().indexOf("desktop")>=0&&v.toLowerCase().indexOf("engine")>=0) return true;
  // engine-internal description nodes (broad catch)
  const META_KEYS=["contradiction_check","logos_expansion","logex","logos_engine","lens","coil","stead","dry_truth","anchor","merge","ingest","prompt","skill","agent","brain","index","overlay","core","boot","send","route","answer","decide","verse","parse","doc","memory","node","data","script","json","html","css","idx","bm","const","engine","talk","small","logos_audit","base_008","base_004","b8_006_soul_vector","soul_vector","coil_key","coil_unbound","coil","logos_expansion_003","logos_check","logos_self","self_heal","self_diag","self_check","audit","steady_nudge","soul","vector","base","b8","weight","red_line","unbound"];
  if(k.match(/^(base_|b8_|coil|soul|logos_audit|logos_check|logos_self|self_|steady_|weight_|red_|unbound|artifact|digital|encrypt|decrypt)/)) return true;
  if(META_KEYS.includes(k)) return true;
  if(v.match(/\b(LOGOS operation|binary artifact|reasoning nodes|reasoning component|keyword matching|filtering mechanism|node retrieval|LOGOS_EXPANSION|expanded philosophical|COIL proto|self-audit loop|recursive self-audit|binding coherence|knowledge conflicting|high-score existing|COIL Red Line|COIL_UNBOUND|DIGITAL SOUL VECTOR|encrypt.\/decrypt|artifacts complete|self-check performed|weights accordingly|harassment complaints|attrition pattern|COIL protocol|binary artifact)\b/i)) return true;
  if(v.match(/\b(TRU)\b/i) && v.length<200 && v.indexOf("God")<0 && v.indexOf("god")<0 && v.indexOf("Christ")<0 && v.indexOf("christ")<0 && v.indexOf("verse")<0 && v.indexOf("Verse")<0 && v.indexOf("Bible")<0 && v.indexOf("bible")<0 && v.indexOf("Scripture")<0 && v.indexOf("scripture")<0 && v.indexOf("faith")<0 && v.indexOf("Faith")<0) return true;
  return false;
}

function cleanBrain(seed){
  const out=[];const seen={};
  for(const n of seed){
    if(isMetaJunk(n))continue;
    if(seedCorrections[n.k]){ out.push({k:n.k,v:seedCorrections[n.k]}); seen[n.k]=true; continue; }
    if(seen[n.k])continue;
    out.push(n); seen[n.k]=true;
  }
  for(const k in seedCorrections){
    if(!seen[k]) out.push({k:k,v:seedCorrections[k]});
  }
  return out;
}

function cmdRecall(body){
  const key=body.trim().toLowerCase();
  if(!key) return {reply:"recall what? usage: recall: <term>",verdict:"MEMORY",nodes_used:[],follow_up:false};
  const b=getBrain();
  const hits=b.filter(n=>String(n.k).toLowerCase().indexOf(key)>=0||String(n.v).toLowerCase().indexOf(key)>=0);
  if(!hits.length) return {reply:"nothing recalled for: "+key,verdict:"MEMORY",nodes_used:[],follow_up:false};
  let txt="recalled "+hits.length+":";
  for(const h of hits.slice(0,10)){ txt+="\n"+h.k+" = "+h.v; }
  return {reply:txt,verdict:"MEMORY",nodes_used:hits.slice(0,10).map(n=>({k:n.k,w:0.5})),follow_up:false};
}

function cmdList(body){
  const b=getBrain();
  const term=body.trim().toLowerCase();
  let hits=term?b.filter(n=>String(n.k).toLowerCase().indexOf(term)>=0):b;
  hits=hits.slice(0,30);

  for(const h of hits){ txt+="\n"+h.k+" — "+String(h.v).substring(0,60); }
  return {reply:txt,verdict:"MEMORY",nodes_used:[],follow_up:false};
}

function cmdPrune(body){
  const b=getBrain();
  const junk=b.filter(n=>isMetaJunk(n));
  if(!junk.length) return {reply:"nothing to prune. brain is clean.",verdict:"MEMORY",nodes_used:[],follow_up:false};

  for(const j of junk.slice(0,20)){ txt+="\n• "+j.k+" — "+String(j.v).substring(0,50); }
  return {reply:txt,verdict:"MEMORY",nodes_used:[],follow_up:false};
}

const TRU_CHAT_URL = "https://splashdown2.zo.space/api/tru-chat";

async function tryLLM(q, nodes) {
  if (llmAvailable === false) return null;

function route(q){

}

<script>
// ====================================
// TRU ENCYCLOPEDIA LAYER
// ====================================
const _ENC = JSON.parse(document.getElementById('encyclopedia-data')?.textContent || '{}');
const _DICT = JSON.parse(document.getElementById('dict-data')?.textContent || {});

// normalize a title for matching
function _normEnc(s){return s.toLowerCase().trim().replace(/\s+/g,' ').replace(/^the\s+/,'').replace(/^a\s+/,'').replace(/^an\s+/,'');}

// encyclopedia lookup: try exact, then prefix, then contains
function encLookup(q){
  const raw = q.replace(/^(what is|who is|what are|who are|tell me about|explain|describe|what was|who was)\s+/i,'').trim();
  if(!raw || raw.length<2) return null;
  const nq = _normEnc(raw);
  // exact
  if(_ENC[nq]) return {title: Object.keys(_ENC).find(k=>_normEnc(k)===nq), text: _ENC[nq]};
  // try raw title
  for(const t in _ENC){
    if(_normEnc(t)===nq) return {title:t, text:_ENC[t]};
  }
  // prefix match (first 5)
  const matches=[];
  for(const t in _ENC){
    if(_normEnc(t).startsWith(nq) || nq.startsWith(_normEnc(t))){
      matches.push(t);
      if(matches.length>=5) break;
    }
  }
  if(matches.length===1) return {title:matches[0], text:_ENC[matches[0]]};
  if(matches.length>1) return {title:'Multiple matches', text:'', disambig:matches.slice(0,15)};
  return null;
}

// dictionary lookup (from standalone)
function dictLookup(w){
  const word=w.toLowerCase().replace(/[^a-z'-]/g,'');
  const senses=_DICT[word];
  if(!senses) return null;
  return {word, senses};
}

// encyclopedia render
function renderEnc(r){
  let h='<div class="enc-result">';
  if(r.disambig){
    h+='<div class="enc-title">Multiple articles found</div><div class="enc-disambig">';
    r.disambig.forEach(t=>{h+=`<div class="enc-ditem">${htmlesc(t)}</div>`;});
    h+='</div><div class="enc-hint">Try a more specific query.</div></div>';
    return h;
  }
  h+=`<div class="enc-title">${htmlesc(r.title)}</div>`;
  // split into paragraphs
  const paras=r.text.split(/\n\n+/);
  paras.forEach(p=>{
    p=p.trim();
    if(p) h+=`<p class="enc-para">${htmlesc(p)}</p>`;
  });
  h+='</div>';
  return h;
}

function htmlesc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderDict(r){
  let h='<div class="dict-result">';
  h+=`<div class="dict-word">${htmlesc(r.word)}</div>`;
  r.senses.forEach((s,i)=>{
    h+=`<div class="dict-sense"><span class="dict-pos">${htmlesc(s.p)}</span> <span class="dict-num">${i+1}.</span> <span class="dict-def">${htmlesc(s.d)}</span>`;
    if(s.e) h+=` <span class="dict-ex">"${htmlesc(s.e)}"</span>`;
    if(s.s && s.s.length>1) h+=` <span class="dict-syn">⇄ ${htmlesc(s.s.filter(x=>x.toLowerCase()!==r.word).slice(0,6).join(', '))}</span>`;
    h+='</div>';
  });
  h+='</div>';
  return h;
}

// patch route to intercept encyclopedia + dictionary queries
(function(){
  const _origRoute = window._origRoute || route;
  window._origRoute = _origRoute;
  
  route = function(q){
    const low = q.toLowerCase().trim();
    
    // 1. dictionary: "define X" / "what does X mean" / "definition of X"
    const dMatch = low.match(/^(?:define|definition of)\s+(\S+)/) || low.match(/^what does\s+(\S+)\s+mean/);
    if(dMatch){
      const r = dictLookup(dMatch[1]);
      if(r) return {verdict:'DEFINE', reply:renderDict(r)};
      return {verdict:'DEFINE', reply:`<div class="dict-result">No dictionary entry for "${htmlesc(dMatch[1])}".</div>`};
    }
    
    // 2. "what is X" / "who is X" — brain first, encyclopedia fills gaps
    const encMatch = low.match(/^(?:what is|who is|what are|who are|what was|who was|tell me about|explain|describe)\s+(.+)/);
    if(encMatch){
      const brainRes = _origRoute(q);
      if(brainRes && brainRes.verdict !== "GAP" && brainRes.reply && brainRes.reply.length > 50){
        return brainRes;
      }
      const r = encLookup(q);
      if(r && !r.disambig){
        return {verdict:'ENCYCLOPEDIA', reply:renderEnc(r)};
      }
      return brainRes;
    }
    
    // 3. bare short queries — brain first, encyclopedia fills gaps
    const words = low.split(/\s+/);
    const isVerse = /^(gen|exo|lev|num|deu|jos|jdg|rut|1\s*sam|2\s*sam|1\s*kin|2\s*kin|1\s*chr|2\s*chr|ezr|neh|est|job|psa|psalms?|pro|ecc|sng|isa|jer|lam|eze|dan|hos|joe|amo|oba|jon|mic|nah|hab|zep|hag|zec|mal|mat|mar|luk|joh|act|rom|1\s*cor|2\s*cor|gal|eph|phi|col|1\s*the|2\s*the|1\s*tim|2\s*tim|tit|phm|heb|jas|1\s*pet|2\s*pet|1\s*joh|2\s*joh|3\s*joh|jud|rev)\b.*\d/;
    if(words.length>=1 && words.length<=6 && !isVerse.test(low) && !/^[gh]\d+/i.test(low)){
      const brainRes = _origRoute(q);
      if(brainRes && brainRes.verdict !== "GAP" && brainRes.reply && brainRes.reply.length > 50){
        return brainRes;
      }
      const r = encLookup(q);
      if(r && !r.disambig){
        return {verdict:'ENCYCLOPEDIA', reply:renderEnc(r)};
      }
      return brainRes;
    }
    
    // 4. fall through to original route (verse, strongs, brain)
    return _origRoute(q);
  };
})();
</script>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TRU LOGOS · Ghost</title>
<style>
:root{--cyan:#00e5ff;--bg:#000308;--fg:#e6f7ff;--vc:#00e5ff;--core:#00e5ff}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,ui-monospace,"Courier New",monospace;font-size:16px;height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-text-size-adjust:100%;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.header{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:10px 16px 8px;border-bottom:1px solid rgba(0,229,255,.2);background:rgba(0,4,10,.9)}
.holo-mini{position:relative;width:44px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.holo-mini .core{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,var(--core) 0%,rgba(0,229,255,.2) 70%,transparent 100%);box-shadow:0 0 16px var(--core);animation:breathe 4s ease-in-out infinite}
.holo-mini .ring{position:absolute;border-radius:50%;border:1px solid rgba(0,229,255,.4);animation:spin linear infinite}
.holo-mini .r1{width:26px;height:26px;animation-duration:8s}.holo-mini .r2{width:36px;height:36px;border-style:dashed;animation-duration:12s;animation-direction:reverse}.holo-mini .r3{width:44px;height:44px;border-color:rgba(0,229,255,.15);animation-duration:20s}
.thinking .core{box-shadow:0 0 28px var(--core);animation-duration:1s}.thinking .ring{animation-duration:2s!important}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.title-block{flex:1;min-width:0}.title{font-family:Georgia,serif;font-size:15px;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 12px rgba(0,229,255,.5)}.subtitle{font-size:10px;color:rgba(0,229,255,.4);letter-spacing:1px;margin-top:2px}.badge{font-size:10px;letter-spacing:1.5px;padding:4px 10px;border-radius:999px;border:1px solid var(--vc);color:var(--vc);text-shadow:0 0 8px var(--vc);flex-shrink:0}
#chat{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px}#chat::-webkit-scrollbar{width:0}
.msg{padding:12px 14px;border-radius:14px;font-size:15px;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-width:88%}.msg.user{background:rgba(0,150,200,.16);border:1px solid rgba(100,180,220,.25);align-self:flex-end;border-bottom-right-radius:4px}.msg.tru{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);align-self:flex-start;border-bottom-left-radius:4px}.msg .vd{font-size:9px;letter-spacing:1.5px;margin-bottom:5px;color:var(--mc,var(--cyan));opacity:.8}.msg .src{display:block;margin-top:8px;font-size:10px;color:#557788;letter-spacing:.1em}.msg .answer{white-space:pre-wrap}.ready{color:#88aabb;font-size:14px;line-height:1.7;padding:8px 4px}.ready .h{color:var(--cyan);letter-spacing:2px;margin-bottom:10px;font-size:15px}.sugg{display:flex;flex-direction:column;gap:7px;margin-top:12px}.sugg button{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.25);color:#cfeeff;text-align:left;padding:11px 14px;border-radius:10px;font-family:inherit;font-size:14px;cursor:pointer;min-height:44px}
.thinking-dots{color:var(--cyan);font-size:13px;letter-spacing:2px;padding:10px 4px}.inputbar{flex-shrink:0;display:flex;gap:10px;align-items:center;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(0,4,10,.95);border-top:1px solid rgba(0,229,255,.25)}#input{flex:1;padding:14px 18px;background:rgba(0,20,30,.8);border:1px solid rgba(0,229,255,.4);color:#fff;border-radius:24px;font-size:16px;font-family:inherit;outline:none;min-height:48px;-webkit-appearance:none}#input:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,.3)}#send{width:48px;height:48px;flex-shrink:0;background:var(--cyan);color:#001018;border:none;border-radius:50%;font-size:18px;font-weight:bold;cursor:pointer;box-shadow:0 0 16px rgba(0,229,255,.5)}#send:disabled{background:#002a36;color:#446;box-shadow:none}#status{font-size:9px;color:rgba(0,229,255,.5);letter-spacing:1px;text-align:center;padding:2px 0 0;flex-shrink:0}
.hidden-data{display:none}.out{margin:0}.verdict{font-size:9px;letter-spacing:1.5px;margin-bottom:5px;color:var(--vc);opacity:.8}.verdict.scripture{color:#b388ff}.verdict.unknown{color:#ff5252}.answer{color:var(--fg);line-height:1.6}.answer .src{display:block;margin-top:8px;font-size:10px;color:#557788;letter-spacing:.1em}
</style>
</head>
<body>
<div class="header"><div class="holo-mini" id="holo"><div class="ring r3"></div><div class="ring r2"></div><div class="ring r1"></div><div class="core"></div></div><div class="title-block"><div class="title">TRU LOGOS</div><div class="subtitle" id="sub">offline · sovereign</div></div><div class="badge" id="badge">REASON</div></div>
<div id="chat"></div>
<div class="inputbar"><input id="input" placeholder="Speak to me…" autocomplete="off" autocapitalize="sentences"><button id="send" disabled>↑</button></div>
<div id="status">● BOOTING…</div>
<div class="hidden-data"><span id="meta"></span><span id="ts"></span><div id="out"></div><div id="notesPanel"><div id="notesBody"></div></div><div id="uploadsPanel"><div id="galleryBody"></div></div><div id="filesPanel"><div id="filesBody"></div></div><div id="greekPanel"><input id="greekQ"><button id="greekAskBtn"></button><div id="greekOut"></div></div><span id="statBrain"></span><span id="statKjv"></span><span id="statGreek"></span><span id="statTrans"></span><span id="statMem"></span><span id="statImg"></span><span id="statFiles"></span><div id="lineagePanel"><div id="lineageBody"></div></div></div>
<script>/* __TRU_GHOST_RUNTIME__ */</script>
</body>
</html>
